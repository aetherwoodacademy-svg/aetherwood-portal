<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherwood — The Lantern</title>

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://aetherwood.au/lantern">
  <meta property="og:title"       content="Aetherwood — The Lantern">
  <meta property="og:description" content="In the stillness / With shadow fallen behind / A light emerges — a glimmer, a promise of all that is to come.">
  <meta property="og:image"       content="https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/lantern.jpg">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Aetherwood — The Lantern">
  <meta name="twitter:description" content="In the stillness / With shadow fallen behind / A light emerges — a glimmer, a promise of all that is to come.">
  <meta name="twitter:image"       content="https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/lantern.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100%;
      background: #060305;
      color: rgba(228, 208, 158, 0.92);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* ——— PAGE ——— */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8vh 6vw 10vh;
      animation: pageRise 2.8s ease 0.2s both;
    }

    @keyframes pageRise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ——— LANTERN IMAGE ——— */
    .lantern-wrap {
      position: relative;
      width: min(70vw, 460px);
      aspect-ratio: 1 / 1;
      margin-bottom: 4.5vh;
      flex-shrink: 0;
    }

    .lantern-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Fade image edges into page background */
    .lantern-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 38%, rgba(6,3,5,0.7) 72%, #060305 100%),
        linear-gradient(to bottom, #060305 0%, transparent 12%, transparent 82%, #060305 100%);
      pointer-events: none;
    }

    /* ——— MOON PHASE LABEL ——— */
    .moon-phase {
      font-size: clamp(10px, 1.1vw, 12px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(195, 168, 108, 0.48);
      margin-bottom: 4vh;
      text-align: center;
    }

    /* ——— POEM ——— */
    .poem {
      text-align: center;
      max-width: min(90vw, 440px);
      margin-bottom: 7vh;
    }

    .poem-line {
      display: block;
      font-size: clamp(16px, 2.1vw, 21px);
      font-style: italic;
      font-weight: 300;
      line-height: 1.95;
      color: rgba(238, 218, 165, 0.93);
      letter-spacing: 0.03em;
    }

    .poem-break {
      display: block;
      height: 1em;
    }

    /* ——— PORTAL CTA ——— */
    /* Uncomment and set href when the portal is live */
    .portal-cta {
      display: block;
      font-size: clamp(10px, 1vw, 11px);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(195, 168, 108, 0.42);
      text-decoration: none;
      margin-bottom: 7vh;
      transition: color 1s ease;
    }
    .portal-cta:hover { color: rgba(228, 200, 135, 0.82); }

    /* ——— WORDMARK ——— */
    .wordmark {
      font-size: clamp(10px, 1.1vw, 13px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(175, 150, 95, 0.28);
      text-align: center;
    }

    /* ——— MOBILE ——— */
    @media (max-width: 600px) {
      .lantern-wrap { width: min(88vw, 380px); }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="lantern-wrap">
      <img src="https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/lantern.jpg" alt="A lantern burning in a stone arch deep within Aetherwood">
    </div>

    <div class="moon-phase" id="moonPhase"></div>

    <div class="poem" id="poem"></div>

    <!-- Reveal this when the portal opens: remove display:none and set href -->
    <a class="portal-cta" href="threshold.html" id="portalCta">follow the light</a>

    <div class="wordmark">Aetherwood</div>

  </div>

  <script>
    /* ——————————————————————————————————————
       MOON PHASE CALCULATOR
       Reference new moon: 16 June 2026 UTC
       Synodic period: 29.53059 days
    —————————————————————————————————————— */
    var REF = Date.UTC(2026, 5, 16, 0, 0, 0);
    var SYNODIC_MS = 29.53059 * 24 * 60 * 60 * 1000;

    function getMoonPhase() {
      var elapsed = ((Date.now() - REF) % SYNODIC_MS + SYNODIC_MS) % SYNODIC_MS;
      var day = elapsed / (24 * 60 * 60 * 1000);
      if (day < 1.85)  return 0; // New Moon
      if (day < 7.38)  return 1; // Waxing Crescent
      if (day < 9.22)  return 2; // First Quarter
      if (day < 14.77) return 3; // Waxing Gibbous
      if (day < 16.61) return 4; // Full Moon
      if (day < 22.15) return 5; // Waning Gibbous
      if (day < 24.00) return 6; // Last Quarter
      return 7;                   // Dark Moon
    }

    var PHASE_NAMES = [
      'New Moon',
      'Waxing Crescent',
      'First Quarter',
      'Waxing Gibbous',
      'Full Moon',
      'Waning Gibbous',
      'Last Quarter',
      'Dark Moon'
    ];

    /* ——————————————————————————————————————
       POEMS
       One array of lines per phase.
       Use '|' for a stanza break.
       Add poems as you write them — null = falls back to New Moon poem.
    —————————————————————————————————————— */
    var POEMS = [
      /* 0 — New Moon */
      [
        'In the stillness',
        'With shadow fallen behind',
        'A light emerges',
        'A glimmer',
        'A promise',
        'Of all that is to come',
        '|',
        'Deep within the woods',
        'A lantern shines',
        'Its steady light',
        'Showing you the way',
        'If you dare to trust',
        '|',
        'Will you step through',
        'Into the warmth',
        'And out of the shadow',
        'To discover what awaits',
        'Beyond the fork in the road?'
      ],
      /* 1 — Waxing Crescent */ null,
      /* 2 — First Quarter   */ null,
      /* 3 — Waxing Gibbous  */ null,
      /* 4 — Full Moon       */ null,
      /* 5 — Waning Gibbous  */ null,
      /* 6 — Last Quarter    */ null,
      /* 7 — Dark Moon       */ null
    ];

    /* ——————————————————————————————————————
       RENDER
    —————————————————————————————————————— */
    var phase = getMoonPhase();
    var poem  = POEMS[phase] || POEMS[0];

    document.getElementById('moonPhase').textContent = PHASE_NAMES[phase];

    var poemEl = document.getElementById('poem');
    poem.forEach(function(line) {
      if (line === '|') {
        var br = document.createElement('span');
        br.className = 'poem-break';
        poemEl.appendChild(br);
      } else {
        var span = document.createElement('span');
        span.className = 'poem-line';
        span.textContent = line;
        poemEl.appendChild(span);
      }
    });
  </script>
</body>
</html>
