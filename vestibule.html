<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aetherwood — The Vestibule (arched ceiling reveal, OG walls)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--font:'Cormorant Garamond',serif;--indigo:#0a0814;--indigo-deep:#060410;}
html,body{width:100%;height:100%;background:var(--indigo-deep);overflow:hidden;font-family:var(--font);user-select:none;-webkit-user-select:none;}
.vestibule{position:relative;width:100%;height:100%;overflow:hidden;touch-action:none;cursor:grab;background:var(--indigo-deep);}
.vestibule.dragging{cursor:grabbing;}

/* ————— THE HALL : a 3D scene. You walk forward into it. ————— */
.viewport{position:absolute;inset:0;perspective:1100px;perspective-origin:50% 46%;z-index:5;}
.world{position:absolute;inset:0;transform-style:preserve-3d;will-change:transform;}

/* far end of the hall : now only a light atmospheric veil. The real back wall lives in the 3D shell. */
.hall-end{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 46%,rgba(2,1,7,0.38) 0%,rgba(4,3,11,0.20) 34%,transparent 68%);}

/* persistent anchors */
.world-frame{position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,rgba(2,1,7,1.0) 0%,rgba(3,2,9,0.92) 7%,rgba(8,6,18,0.62) 17%,transparent 36%,transparent 62%,rgba(7,5,4,0.40) 82%,rgba(2,1,7,0.97) 100%);}
.world-vignette{position:absolute;inset:0;z-index:14;pointer-events:none;
  background:linear-gradient(to right,rgba(2,1,7,0.94) 0%,rgba(3,2,9,0.60) 12%,rgba(3,2,9,0.22) 26%,transparent 38%),linear-gradient(to left,rgba(2,1,7,0.94) 0%,rgba(3,2,9,0.60) 12%,rgba(3,2,9,0.22) 26%,transparent 38%),radial-gradient(ellipse at 50% 50%,transparent 34%,rgba(3,2,9,0.44) 84%,rgba(2,1,7,0.82) 100%);}

/* ————— FLOOR : one plane, lying into the depth. reflections live here. ————— */
.hall-floor{position:absolute;left:50%;top:50%;will-change:transform;pointer-events:none;
  background:linear-gradient(to bottom,rgba(4,3,10,0.0) 0%,rgba(10,8,20,0.35) 70%,rgba(12,9,22,0.5) 100%);}
.floor-spot{position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(ellipse,rgba(224,174,94,0.22) 0%,rgba(206,152,76,0.08) 45%,transparent 72%);}
.floor-spot.cold{background:radial-gradient(ellipse,rgba(160,170,224,0.13) 0%,rgba(140,150,210,0.05) 45%,transparent 72%);}
.floor-spot.faint{opacity:0.55;}

/* ————— SHELL : stone walls and ceiling. Its own 3D layer, riding the same
   camera as the world but always painted behind it — the doors, halos and
   pools can never be sliced or hidden by the stone. ————— */
.world-shell{position:absolute;inset:0;transform-style:preserve-3d;will-change:transform;pointer-events:none;}
.shell-seg{position:absolute;left:50%;top:50%;overflow:visible;pointer-events:none;backface-visibility:hidden;}
.far-wall-seg{filter:saturate(0.82) brightness(0.72);}
.endless-backdrop{}

/* ————— EVERFLAME : sentient wayfinding presence ————— */
#everflame{
  position:fixed; top:3.5vmin; left:3.5vmin;
  width:14vmin; height:14vmin; min-width:90px; min-height:90px;
  background:url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/everflame.jpg') center bottom / contain no-repeat;
  mix-blend-mode:screen;
  filter:brightness(0.6);
  opacity:0.2;
  transition:filter 1.5s ease, opacity 1.2s ease;
  z-index:200; cursor:default; pointer-events:none;
  animation:efLive 8s ease-in-out infinite;
}
#everflame.ef-active{
  filter:brightness(1.1);
  opacity:1;
  cursor:pointer; pointer-events:all;
}
#everflame.ef-active.urge{
  filter:brightness(1.8) saturate(1.2);
  animation:efLive 2.2s ease-in-out infinite;
}
@keyframes efLive{
  0%{transform:translateY(0) rotate(-1deg) scaleX(1);}
  18%{transform:translateY(-3px) rotate(1.5deg) scaleX(0.98);}
  35%{transform:translateY(-6px) rotate(-1deg) scaleX(1.02);}
  52%{transform:translateY(-4px) rotate(1.8deg) scaleX(0.97);}
  68%{transform:translateY(-7px) rotate(-1deg) scaleX(1.02);}
  82%{transform:translateY(-3px) rotate(1deg) scaleX(0.99);}
  100%{transform:translateY(0) rotate(-1deg) scaleX(1);}
}
.shell-spot{position:absolute;pointer-events:none;border-radius:50%;}
.ceiling-pin{position:absolute;pointer-events:none;border-radius:50%;filter:blur(0.2px);}
.ceiling-lantern{position:absolute;pointer-events:none;border-radius:50%;}
.ceiling-lantern::before{content:'';position:absolute;left:50%;top:50%;width:10%;height:10%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,232,174,0.86),rgba(235,180,92,0.24) 58%,transparent 76%);}
.ceiling-veil{display:none;}
.ceiling-light-span{}
/* Arched ceiling reveal — the wall-to-ceiling join is now an architectural
   curve, echoing the door arches. It sits ABOVE the wall image endpoint, so
   the wall and door tops are not cut off or shadowed. */
.ceiling-rise,.cornice-band,.cornice-detail,.cornice-uplight{display:none;}
.arch-reveal{position:absolute;left:0;right:0;top:-15.5vmin;height:16.5vmin;pointer-events:none;overflow:visible;opacity:0.92;}
.arch-reveal::before{content:'';position:absolute;left:-9vmin;right:-9vmin;bottom:0;height:100%;
  background-image:
    radial-gradient(ellipse 48% 106% at 50% 102%,rgba(0,0,0,0) 0 48%,rgba(70,48,39,0.26) 49%,rgba(126,93,62,0.30) 55%,rgba(48,31,30,0.13) 63%,rgba(0,0,0,0) 67%),
    linear-gradient(to bottom,rgba(3,2,9,0.0) 0%,rgba(3,2,9,0.30) 34%,rgba(178,128,68,0.08) 76%,rgba(226,174,92,0.16) 100%);
  background-size:52vmin 100%,100% 100%;background-repeat:repeat-x,no-repeat;background-position:center bottom;filter:blur(0.08px);}
.arch-reveal::after{content:'';position:absolute;left:0;right:0;bottom:-0.25vmin;height:3.4vmin;
  background:linear-gradient(to bottom,rgba(246,214,150,0.10),rgba(223,169,88,0.34) 46%,rgba(88,54,35,0.18) 66%,rgba(0,0,0,0));
  box-shadow:0 -7px 22px rgba(226,174,92,0.12),0 0 18px rgba(226,174,92,0.17);}
.arch-upper-fade{position:absolute;left:-4vmin;right:-4vmin;top:-9vmin;height:11vmin;pointer-events:none;
  background:linear-gradient(to bottom,rgba(3,2,9,0.70),rgba(3,2,9,0.26) 55%,rgba(0,0,0,0));opacity:0.64;}
.arch-uplight{position:absolute;left:0;right:0;bottom:0;height:10vmin;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%,rgba(236,186,98,0.18),rgba(236,186,98,0.065) 42%,rgba(0,0,0,0) 72%);filter:blur(1px);opacity:0.72;}
.arch-rune-line{position:absolute;left:0;right:0;bottom:1.1vmin;height:1px;opacity:0.36;
  background:repeating-linear-gradient(90deg,rgba(236,204,142,0.0) 0,rgba(236,204,142,0.0) 34px,rgba(236,204,142,0.22) 36px,rgba(236,204,142,0.0) 42px);}

.sconce{position:absolute;left:50%;top:50%;pointer-events:none;}

/* ————— DOORS : planes on alternating walls, turning to face you. ————— */
.door-plane{position:absolute;left:50%;top:50%;width:96vw;height:98vh;will-change:transform,opacity,filter;
  pointer-events:none;backface-visibility:hidden;}
@media (min-width: 760px){
  .door-plane{width:clamp(360px,42vw,680px);height:clamp(560px,84vh,920px);}
}
@media (min-width: 1200px){
  .door-plane{width:clamp(420px,36vw,700px);height:clamp(620px,82vh,940px);}
}
.door-plane{clip-path:polygon(0% 100%,0% 16%,1% 11%,3% 7%,6% 4%,10% 2%,14% 0%,86% 0%,90% 2%,94% 4%,97% 7%,99% 11%,100% 16%,100% 100%);}
.door-plane.focus{pointer-events:all;cursor:pointer;}
.door-face{position:absolute;inset:0;background-size:cover;background-position:center;
  box-shadow:0 0 90px 10px rgba(0,0,0,0.55), 0 0 28px 8px rgba(240,165,60,0.32), inset 0 0 0 14px rgba(0,0,0,0.85), inset 0 0 28px 8px rgba(0,0,0,0.6);}
.door-face-vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 55%,transparent 30%,rgba(4,2,10,0.72) 100%),
             linear-gradient(to bottom,rgba(4,2,10,0.55) 0%,transparent 16%,transparent 60%,rgba(4,2,10,0.88) 100%);}
.door-plane.focus.settled .door-face{animation:candleBreath 5.6s ease-in-out infinite;}
@keyframes candleBreath{0%,100%{filter:brightness(1);}50%{filter:brightness(1.055);}}
.door-plane.sealed.focus.settled .door-face{animation:sealedBreath 7.5s ease-in-out infinite;}
@keyframes sealedBreath{0%,100%{filter:brightness(0.94) saturate(0.85);}50%{filter:brightness(1.0) saturate(0.95);}}

/* light reaching down the hall — a billboard glow at each door's station */
.door-halo{position:absolute;left:50%;top:50%;width:140vmin;height:150vmin;will-change:transform,opacity;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(226,176,96,0.22) 0%,rgba(206,152,76,0.09) 42%,transparent 70%);}
.door-halo.cold{background:radial-gradient(ellipse at center,rgba(150,160,220,0.15) 0%,rgba(120,130,200,0.06) 42%,transparent 70%);}

/* ————— CANDLE POOLS : lanterns at your shoulders, real depth now. ————— */
.candle-pool{position:absolute;left:50%;top:50%;border-radius:50%;will-change:transform,opacity;pointer-events:none;
  background:radial-gradient(circle,rgba(232,182,98,0.30) 0%,rgba(214,160,80,0.13) 38%,transparent 70%);}
.candle-pool::after{content:'';position:absolute;left:50%;top:50%;width:14%;height:14%;
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle,rgba(255,226,166,0.75),rgba(240,190,110,0.25) 55%,transparent 75%);
  animation:flick 3.4s ease-in-out infinite alternate;}
@keyframes flick{0%{opacity:0.7;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;}100%{opacity:0.8;transform:translate(-50%,-52%) scale(1.12);}}
.candle-pool.warm{background:radial-gradient(circle,rgba(238,190,104,0.36) 0%,rgba(222,168,84,0.16) 38%,transparent 70%);}
.candle-pool.cold{background:radial-gradient(circle,rgba(168,178,226,0.16) 0%,rgba(140,150,210,0.07) 38%,transparent 70%);}
.candle-pool.cold::after{background:radial-gradient(circle,rgba(208,216,250,0.45),rgba(170,180,235,0.15) 55%,transparent 75%);animation-duration:5.5s;}
.candle-pool.low::after{transform:translate(-50%,-46%) scale(0.6);opacity:0.5;}

/* ————— ATMOSPHERE : trough, cold creep, motes ————— */
.passage-dark{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;will-change:opacity;
  background:radial-gradient(ellipse at 50% 50%,rgba(3,2,9,0.8) 0%,rgba(2,1,7,0.95) 100%);}
.cold-tint{position:absolute;inset:0;z-index:13;pointer-events:none;opacity:0;will-change:opacity;
  background:linear-gradient(to bottom,rgba(128,138,200,0.16),rgba(128,138,200,0.06) 55%,rgba(128,138,200,0.14)),
             radial-gradient(ellipse at 50% 40%,rgba(140,150,215,0.10),transparent 65%);}
.particles{position:absolute;inset:0;z-index:9;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:pdrift var(--pd) ease-in-out infinite var(--po);opacity:0;will-change:transform,opacity;}
@keyframes pdrift{0%{transform:translate(0,0);opacity:0;}20%{opacity:var(--pa);}80%{opacity:calc(var(--pa)*0.4);}100%{transform:translate(var(--px),var(--py));opacity:0;}}

/* a passed door's light lingers at your shoulder */
.edge-glow{position:absolute;top:0;bottom:0;width:13vw;z-index:12;pointer-events:none;opacity:0;will-change:opacity;}
.edge-glow.left{left:0;background:linear-gradient(to right,rgba(222,172,92,0.15),rgba(210,158,80,0.05) 55%,transparent);}
.edge-glow.right{right:0;background:linear-gradient(to left,rgba(222,172,92,0.15),rgba(210,158,80,0.05) 55%,transparent);}
.edge-glow.cold.left{background:linear-gradient(to right,rgba(146,156,216,0.12),rgba(130,140,200,0.04) 55%,transparent);}
.edge-glow.cold.right{background:linear-gradient(to left,rgba(146,156,216,0.12),rgba(130,140,200,0.04) 55%,transparent);}

/* ————— UNSCHEDULED EVENTS ————— */
.candle-pool.gutter::after{animation:gutterAnim 2.8s ease-in-out 1;}
@keyframes gutterAnim{0%{opacity:0.85;transform:translate(-50%,-50%) scale(1);}
  30%{opacity:0.15;transform:translate(-50%,-44%) scale(0.5) skewX(6deg);}
  45%{opacity:0.4;transform:translate(-50%,-50%) scale(0.75);}
  60%{opacity:0.2;transform:translate(-50%,-46%) scale(0.6) skewX(-5deg);}
  100%{opacity:0.85;transform:translate(-50%,-50%) scale(1);}}
.passing-shadow{position:absolute;top:8%;height:120%;width:34vw;z-index:10;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(2,1,6,0.42),transparent 68%);
  filter:blur(14px);animation:shadowCross var(--sd,17s) linear forwards;}
@keyframes shadowCross{0%{transform:translateX(-45vw);opacity:0;}12%{opacity:1;}88%{opacity:1;}100%{transform:translateX(125vw);opacity:0;}}
.drift-mote{position:absolute;border-radius:50%;z-index:10;pointer-events:none;
  background:radial-gradient(circle,rgba(244,210,140,0.9),rgba(230,185,105,0.3) 60%,transparent);
  animation:moteDrift var(--md,11s) ease-in-out forwards;}
@keyframes moteDrift{0%{transform:translate(0,0) scale(0.6);opacity:0;}
  15%{opacity:0.85;}70%{opacity:0.7;}
  100%{transform:translate(var(--mx),var(--my)) scale(1);opacity:0;}}
.wing-shape{position:absolute;top:13%;left:-22vw;width:17vw;height:7vw;z-index:10;pointer-events:none;
  background:radial-gradient(ellipse 60% 42% at 50% 58%,rgba(3,2,8,0.55),transparent 72%);
  filter:blur(9px);border-radius:50%;
  animation:wingPass 6.5s cubic-bezier(0.3,0,0.6,1) forwards;}
@keyframes wingPass{0%{transform:translate(0,0) scaleY(1);opacity:0;}
  14%{opacity:1;}
  35%{transform:translate(45vw,-3vh) scaleY(0.55);}
  60%{transform:translate(82vw,2vh) scaleY(1.15);}
  100%{transform:translate(130vw,-4vh) scaleY(0.7);opacity:0;}}

/* ————— TEXT : one screen-space overlay, present only at rest. ————— */
.door-text{position:absolute;left:0;right:0;bottom:0;top:0;z-index:11;pointer-events:none;opacity:0;}
.door-text.show{opacity:1;}
.door-name{position:absolute;bottom:26%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;}
.door-text.show .door-name{animation:nameRise 2.6s ease 0.45s forwards;}
.door-name-text{display:block;font-size:clamp(16px,2vw,22px);letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,248,235,1);text-shadow:0 1px 3px #000,0 2px 8px #000,0 0 20px #000,0 0 50px #000,0 0 90px rgba(0,0,0,0.95),0 0 140px rgba(0,0,0,0.8);white-space:nowrap;}
.door-name-rule{display:block;width:40px;height:0.5px;background:rgba(215,185,115,0.55);margin:11px auto 0;}
.door-whisper{position:absolute;bottom:19.5%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;white-space:nowrap;}
.door-text.show .door-whisper{animation:nameRise 2.6s ease 0.95s forwards;}
.door-whisper-text{font-size:clamp(14px,1.5vw,17px);font-style:italic;font-weight:300;color:rgba(255,245,225,0.97);letter-spacing:0.07em;text-shadow:0 1px 3px #000,0 2px 8px #000,0 0 20px #000,0 0 50px rgba(0,0,0,0.95),0 0 90px rgba(0,0,0,0.9),0 0 140px rgba(0,0,0,0.75);}
@keyframes nameRise{0%{opacity:0;transform:translateX(-50%) translateY(14px);}55%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}
.door-enter{position:absolute;bottom:8.5%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity 0.8s ease;white-space:nowrap;}
.door-text.show.enterable:hover .door-enter, .vestibule.hover-door .door-text.show.enterable .door-enter{opacity:1;}
.door-enter-text{font-size:clamp(10px,0.95vw,12px);letter-spacing:0.32em;text-transform:uppercase;color:rgba(218,192,132,0.72);text-shadow:0 0 15px #000,0 0 35px #000;}

/* ————— NAV : light only. forward and back down the hall. ————— */
.nav-prev,.nav-next{position:absolute;top:0;bottom:0;z-index:20;cursor:pointer;display:flex;align-items:center;padding:0 20px;transition:opacity 0.8s ease;}
.nav-prev{left:0;}.nav-next{right:0;}
.nav-pip{width:1px;height:52px;background:linear-gradient(to bottom,transparent,rgba(200,170,95,0.32),transparent);transition:all 0.4s ease;}
.nav-prev:hover .nav-pip,.nav-next:hover .nav-pip{background:linear-gradient(to bottom,transparent,rgba(220,190,115,0.68),transparent);height:76px;}
.nav-prev.hidden,.nav-next.hidden{opacity:0;pointer-events:none;}
.nav-label{font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:rgba(214,182,108,0.78);text-shadow:0 0 14px rgba(0,0,0,0.85);white-space:nowrap;margin:0 12px;opacity:0;transition:opacity 0.6s ease;pointer-events:none;}
.nav-prev:hover .nav-label,.nav-next:hover .nav-label,.nav-prev.reveal .nav-label,.nav-next.reveal .nav-label{opacity:1;}

/* ————— ARRIVAL / STEP-THROUGH ————— */
.fade-cover{position:absolute;inset:0;background:var(--indigo);opacity:0;z-index:50;pointer-events:none;}
.fade-cover.in{opacity:1;transition:opacity 1.3s ease;}
.fade-cover.out{opacity:0;transition:opacity 1.6s ease;}
.arrival-tagline{position:absolute;top:30%;left:50%;transform:translateX(-50%);text-align:center;z-index:30;pointer-events:none;opacity:0;animation:taglineFlow 7s ease 0.5s both;}
.arrival-tagline-text{font-size:clamp(19px,2.3vw,27px);font-style:italic;font-weight:300;color:rgba(230,208,160,0.95);letter-spacing:0.1em;line-height:1.85;text-shadow:0 1px 3px #000,0 0 44px #000;}
@keyframes taglineFlow{0%{opacity:0;transform:translateX(-50%) translateY(12px);}18%{opacity:1;transform:translateX(-50%) translateY(0);}62%{opacity:1;}88%{opacity:0;transform:translateX(-50%) translateY(-8px);}100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}
.arrival-greeting{position:absolute;top:38%;left:50%;transform:translateX(-50%);text-align:center;z-index:30;pointer-events:none;white-space:nowrap;opacity:0;animation:greetingFlow 6s ease 2.8s both;}
.arrival-greeting-text{font-size:clamp(18px,2vw,24px);font-style:italic;font-weight:300;color:rgba(228,205,155,0.93);letter-spacing:0.06em;text-shadow:0 1px 3px #000,0 0 40px #000;}
@keyframes greetingFlow{0%{opacity:0;transform:translateX(-50%) translateY(10px);}20%{opacity:1;transform:translateX(-50%) translateY(0);}72%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}

/* the Threshold's bloom, fading at your back as you arrive */
.threshold-afterglow{position:absolute;inset:0;z-index:16;pointer-events:none;
  background:radial-gradient(ellipse at 50% 118%,rgba(232,188,108,0.42) 0%,rgba(214,162,84,0.18) 32%,transparent 58%),
             linear-gradient(to right,rgba(222,172,92,0.14),transparent 22%,transparent 78%,rgba(222,172,92,0.14));
  animation:afterglowFade 5.5s ease 0.4s forwards;}
@keyframes afterglowFade{0%{opacity:1;}100%{opacity:0;}}

/* ————— BEYOND-DOOR : dimensional atmosphere in each alcove ————— */
.door-beyond-el{position:absolute;left:50%;top:50%;will-change:transform;pointer-events:none;backface-visibility:hidden;}

@media (prefers-reduced-motion: reduce){
  .particle{display:none;}
  .candle-pool::after{animation:none;}
  .door-plane.focus.settled .door-face{animation:none;}
}
</style>
</head>
<body>
<div class="vestibule" id="vestibule">

  <div class="hall-end"></div>
  <div class="world-frame"></div>

  <div class="viewport">
    <div class="world-shell" id="worldShell"></div>
    <div class="world" id="world">
      <div class="hall-floor" id="hallFloor"></div>
      <!-- door halos + planes are created in order; alternating walls -->
      <div class="door-halo" id="halo0"></div>
      <div class="door-halo" id="halo1"></div>
      <div class="door-halo" id="halo2"></div>
      <div class="door-halo cold" id="halo3"></div>

      <div class="door-plane" data-index="0" data-sealed="false" data-href="">
        <div class="door-face" style="background-image:url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/door_whispered_archives.jpg');"></div>
        <div class="door-face-vignette"></div>
      </div>
      <div class="door-plane" data-index="1" data-sealed="false" data-href="">
        <div class="door-face" style="background-image:url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/door_library_of_tales.jpg');"></div>
        <div class="door-face-vignette"></div>
      </div>
      <div class="door-plane" data-index="2" data-sealed="false" data-href="">

<script>
(function(){
  'use strict';

  /* ——— RETURNING VISITOR — hearthfire is home ——— */
  /* ?walk=1 means they chose to return to the corridor from the hearthfire */
  var wantsToWalk = new URLSearchParams(window.location.search).get('walk');
  if (localStorage.getItem('aetherwood_visited') && !wantsToWalk) {
    window.location.replace('hearthfire.html');
    return;
  }

  /* ———————————————————————————————————————————————
     THE DEPTH CORRIDOR  (v9)
     Same heart as v8: one continuous position, one physics
     loop, every input feeding the same state. But the axis
     has turned: pos now measures how far DOWN THE HALL you
     have walked. Doors stand on alternating walls and turn
     to face you as you settle before them.
     Sideways is browsing. Forward is entering.
  ——————————————————————————————————————————————— */

  var DOORS = 4, LAST = DOORS - 1;

  var DOOR_META = [
    {name:'Whispered Archives', whisper:'Velin Thorne keeps the door. The raven is awake.', side:-1},
    {name:'Library of Tales',   whisper:'A candle has been set out in the Lost Soul corridor.', side:+1},
    {name:'Compliance Office',  whisper:'Maureen is in. The teacups are warm.', side:-1},
    {name:'Resonance Chamber',  whisper:'Sleeps until the dark of the moon.', side:+1}
  ];

  // —— walking feel — tuned 13 June 2026: heavier stone, softer snap, gentler settle ——
  var DRAG_GAIN  = 1.1;      // slightly more responsive to drag — each swipe feels intentional
  var WHEEL_GAIN = 0.0016;   // trackpad wheel a touch more responsive
  var FRICTION   = 0.945;    // higher friction = heavier stone, momentum dies slower
  var SPRING     = 0.055;    // softer spring — not a carousel snapping, a door drifting into view
  var GOAL_SPRING= 0.04;     // pip/arrow nav unchanged
  var SETTLE_POS = 0.010;    // tighter settle window so it snaps cleanly when it does land
  var SETTLE_VEL = 0.0010;   // matching velocity threshold
  var MAX_VEL    = 0.055;    // fractionally lower ceiling — prevents over-flick on fast swipes
  var RUBBER     = 0.32;     // slightly more bounce resistance at corridor ends

  // —— hall geometry ——
  var SPACING    = 1600;   // px of depth per door
  var WALL_ANGLE = 44;     // deg — doors sit angled in shallow alcoves
  var FACE_RANGE = 0.5;    // within this distance, the door turns to meet you
  var FACE_FWD   = 300;    // px the door steps toward you when fully faced
  var START_POS  = -0.45;  // the hall mouth — where you stand when the Threshold fades
  var FACE_EASE  = 0.05;   // more patient turn — door waits for full stillness before rotating
  var FLOOR_Y_VMIN = 47;
  var WALL_X_VMIN  = 64;
  var POOL_X_VMIN  = 78;

  var vestibule = document.getElementById('vestibule');
  var world     = document.getElementById('world');
  var hallFloor = document.getElementById('hallFloor');
  var passageDark = document.getElementById('passageDark');
  var coldTint  = document.getElementById('coldTint');
  var fadeCover = document.getElementById('fadeCover');
  var edgeL = document.getElementById('edgeL');
  var edgeR = document.getElementById('edgeR');
  var navPrev = document.getElementById('navPrev');
  var navNext = document.getElementById('navNext');
  var doorText = document.getElementById('doorText');
  var nameText = document.getElementById('nameText');
  var whisperText = document.getElementById('whisperText');
  var planes = Array.prototype.slice.call(document.querySelectorAll('.door-plane'));
  var halos  = [0,1,2,3].map(function(i){ return document.getElementById('halo'+i); });
  var sealed = planes.map(function(d){ return d.dataset.sealed === 'true'; });
  var endlessBackdrop = null;

  var pos = 0, vel = 0, goal = null;
  var dragging = false, settled = false, locked = false;
  var awoken = false;      // still arrival: the hall holds its breath until your first movement
  var calmAmt = 0;         // 0 while walking, eases to 1 at rest — gates the turn-to-face
  var lastX = 0, lastT = 0, dragVel = 0, dragMoved = 0;
  var vw = window.innerWidth, vh = window.innerHeight;
  var vmin = Math.min(vw, vh) / 100;
  var _resizeTimer;
  function _onResize(){
    vw = window.innerWidth; vh = window.innerHeight;
    vmin = Math.min(vw, vh) / 100;
    buildFloor(); buildShell(); buildSconces(); buildBeyond();
  }
  window.addEventListener('resize', function(){ clearTimeout(_resizeTimer); _resizeTimer = setTimeout(_onResize, 250); });

  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function smooth(t){ t = clamp(t,0,1); return t*t*(3-2*t); }

  /* ———— candle pools : lanterns in real depth, zoned in temperature ———— */
  var pools = [];
  var poolDefs = [
    {cx:-0.45, side:+1, y:-4,  s:30},
    {cx: 0.34, side:-1, y: 8,  s:38},
    {cx: 0.62, side:+1, y:-8,  s:32},
    {cx: 1.36, side:-1, y: 6,  s:36, k:'warm'},
    {cx: 1.62, side:+1, y:-6,  s:34, k:'warm'},
    {cx: 1.86, side:-1, y:10,  s:32, k:'warm'},
    {cx: 2.42, side:+1, y: 6,  s:32, k:'low'},
    {cx: 2.72, side:-1, y:-6,  s:26, k:'cold low'},
    {cx: 3.40, side:+1, y: 4,  s:30, k:'cold low'}
  ];
  poolDefs.forEach(function(p){
    var el = document.createElement('div');
    el.className = 'candle-pool' + (p.k ? ' ' + p.k : '');
    el.style.width = p.s+'vmin'; el.style.height = (p.s*1.2)+'vmin';
    world.appendChild(el);
    pools.push({el:el, cx:p.cx, side:p.side, y:p.y, cold:(p.k||'').indexOf('cold')>=0});
  });

  /* ———— floor : one plane lying into the depth, light pooling on stone ———— */
  function buildFloor(){
    var nearZ = 900, farZ = -(LAST*SPACING + 1400 + SPACING);
    var L = nearZ - farZ;                 // plane length in px
    var W = 300*vmin;
    var zc = (nearZ + farZ) / 2;
    hallFloor.style.width  = W+'px';
    hallFloor.style.height = L+'px';
    hallFloor.style.transform =
      'translate(-50%,-50%) translate3d(0,'+(FLOOR_Y_VMIN*vmin)+'px,'+zc+'px) rotateX(90deg)';
    // glow spots: top of plane = far end; offset from top = z - farZ
    hallFloor.innerHTML = '';
    function spot(z, x, w, h, cls){
      var s = document.createElement('div');
      s.className = 'floor-spot' + (cls ? ' '+cls : '');
      s.style.width = w+'px'; s.style.height = h+'px';
      s.style.left = (W/2 + x - w/2)+'px';
      s.style.top  = ((z - farZ) - h/2)+'px';
      hallFloor.appendChild(s);
    }
    for (var i=0;i<DOORS;i++){
      spot(-i*SPACING, DOOR_META[i].side * 40*vmin, 120*vmin, 90*vmin, sealed[i]?'cold':'');
    }
    pools.forEach(function(p){
      spot(-p.cx*SPACING, p.side * 60*vmin, 60*vmin, 44*vmin, (p.cold?'cold ':'')+'faint');
    });
  }
  buildFloor();

  /* ———— shell : stone walls + ceiling, segmented per station for culling ————
     The walls break at each door's station, leaving a dark alcove opening
     that the door stands within. Light patches are painted onto the stone
     at the known positions of the lantern pools and door stations, so the
     hall's existing lights finally land on something. */

  var SHELL_WALL_X = 84;    // vmin — the stone line, just beyond the lanterns
  var SHELL_CEIL_Y = -55;   // vmin — ceiling height above eye line
  var SHELL_GAP    = 40;    // vmin — half-width of each door's alcove opening
  var shellSegs = [];
  /* ———— stone textures : generated inline, no image assets ————
     Real stone is variation at two scales — large cloudy mineral
     mottling and fine grain — in BOTH light and dark, plus masonry:
     individual blocks, each its own shade, with dark mortar joints. */
  function noiseURI(bf, oct, size, r, g, b, a){
    return 'url("data:image/svg+xml,'+encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'">'
      +'<filter id="n"><feTurbulence type="fractalNoise" baseFrequency="'+bf+'" numOctaves="'+oct+'" stitchTiles="stitch"/>'
      +'<feColorMatrix type="matrix" values="0 0 0 0 '+r+'  0 0 0 0 '+g+'  0 0 0 0 '+b+'  0 0 0 '+a+' 0"/></filter>'
      +'<rect width="'+size+'" height="'+size+'" filter="url(#n)"/></svg>')+'")';
  }
  var GRAIN_LIGHT   = noiseURI('0.9','2',220, 0.92,0.84,0.66, 0.10);   // warm fleck
  var GRAIN_DARK    = noiseURI('0.9','3',220, 0,0,0,          0.16);
  var MINERAL_LIGHT = noiseURI('0.013 0.02','3',640, 0.88,0.82,0.68, 0.07);
  var MINERAL_DARK  = noiseURI('0.011 0.018','3',640, 0,0,0,         0.22);

  function buildShell(){
    worldShell.innerHTML = '';
    shellSegs = [];
    var nearZ = 900, farZ = -(LAST*SPACING + 1400 + SPACING);
    var wx = SHELL_WALL_X*vmin, ceilY = SHELL_CEIL_Y*vmin, floorY = FLOOR_Y_VMIN*vmin;
    var H = floorY - ceilY, yc = (floorY + ceilY)/2;
    function dk(z){ return clamp((nearZ - z)/(nearZ - farZ), 0, 1); }

    /* photo spans: one unfolded photograph per station stretch. Seams sit
       exactly beneath the arches; alternate spans mirror so the stone is
       continuous across every seam. */
    var bounds = [nearZ, -800, -2400, -4000, -5600, -7200, farZ];
    function span(kind, z0, z1, flip){
      var el = document.createElement('div');
      el.className = 'shell-seg';
      var len = z0 - z1, zc = (z0+z1)/2;
      var a0 = (0.62 + 0.35*dk(z0)).toFixed(2), a1 = (0.62 + 0.35*dk(z1)).toFixed(2);
      var tf, dir, tex;
      if (kind === 'L' || kind === 'R'){
        var sd = (kind === 'L') ? -1 : 1;
        el.className += ' wall-span wall-span-' + kind.toLowerCase();
        el.style.width = len.toFixed(1)+'px'; el.style.height = H.toFixed(1)+'px';
        tf = 'translate(-50%,-50%) translate3d('+(sd*wx).toFixed(1)+'px,'+yc.toFixed(1)+'px,'+zc.toFixed(1)+'px) rotateY('+(sd<0?90:-90)+'deg)';
        dir = (sd<0) ? (flip?'to left':'to right') : (flip?'to right':'to left');
        tex = (kind==='L') ? "url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/wall_left.jpg')" : "url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/wall_right.jpg')";
        if (flip) tf += ' scale(-1,1)';
      } else {
        el.style.width = (2*wx).toFixed(1)+'px'; el.style.height = len.toFixed(1)+'px';
        tf = 'translate(-50%,-50%) translate3d(0,'+floorY.toFixed(1)+'px,'+zc.toFixed(1)+'px) rotateX(90deg)';
        dir = flip ? 'to bottom' : 'to top';     /* floor plane: top = far */
        tex = "url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/floor_stone.jpg')";
        if (flip) tf += ' scale(1,-1)';
      }
      el.style.transform = tf;
      el.style.background = 'linear-gradient('+dir+', rgba(2,1,7,'+a0+'), rgba(2,1,7,'+a1+')),' + tex;
      el.style.backgroundSize = '100% 100%, auto 100%';
      if (kind === 'L' || kind === 'R'){
      }
      worldShell.appendChild(el);
      shellSegs.push({el:el, zN:z0, zF:z1, hidden:false});
    }
    for (var i=0;i<bounds.length-1;i++){
      var f = (i%2===1);
      // Keep every side wall span using the same orientation so no single
      // transition reads as a different wall texture. The floor can still
      // alternate because it is not the problem plane.
      span('L', bounds[i], bounds[i+1], false);
      span('R', bounds[i], bounds[i+1], false);
      span('F', bounds[i], bounds[i+1], f);
    }

    /* endless corridor backdrop: same harvested stone language is always present from the first frame.
       It is not a literal end wall. Render moves it ahead of the camera and modulates light so it feels
       closer as you walk, then recedes again for the next stretch. This keeps the hall future proof for
       more doors without changing side walls, doors, or corridor geometry. */
    var back = document.createElement('div');
    back.className = 'shell-seg endless-backdrop';
    back.style.width = (2*wx).toFixed(1)+'px';
    back.style.height = (H*1.3).toFixed(1)+'px';
    back.style.transform = 'translate(-50%,-50%) translate3d(0,'+(yc - H*0.15).toFixed(1)+'px,'+farZ.toFixed(1)+'px)';
    back.style.background =
        'linear-gradient(to right, rgba(2,1,7,0.92), transparent 32%, transparent 68%, rgba(2,1,7,0.92)),'
      + "url('https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/corridor_backdrop.jpg')";
    back.style.backgroundSize = 'auto, contain';
    back.style.backgroundRepeat = 'no-repeat';
    back.style.backgroundPosition = 'center center';
    worldShell.appendChild(back);
    endlessBackdrop = back;
    shellSegs.push({el:back, zN:nearZ, zF:farZ, hidden:false, endless:true});

    /* ceiling atmosphere only: no opaque ceiling surface. The visible transition is now an illuminated cornice added to the original wall planes. */
    var spanCount = 4, spanLen = (nearZ - farZ)/spanCount, cw = 2*wx;
    var WARM = 'radial-gradient(ellipse, rgba(228,178,96,0.30) 0%, rgba(206,152,76,0.13) 45%, transparent 72%)';
    var COLD = 'radial-gradient(ellipse, rgba(158,168,224,0.20) 0%, rgba(132,142,205,0.09) 45%, transparent 72%)';
    for (var k=0;k<spanCount;k++){
      var z0 = nearZ - k*spanLen, z1 = z0 - spanLen;
      var el = document.createElement('div');
      el.className = 'shell-seg ceiling-light-span';
      el.style.width = cw.toFixed(1)+'px';
      el.style.height = spanLen.toFixed(1)+'px';
      el.style.transform = 'translate(-50%,-50%) translate3d(0,'+ceilY.toFixed(1)+'px,'+((z0+z1)/2).toFixed(1)+'px) rotateX(-90deg)';
      var ca0 = (0.28 + 0.55*dk(z0)).toFixed(2), ca1 = (0.28 + 0.55*dk(z1)).toFixed(2);
      var ov = (0.14 + 0.58*dk(z0)).toFixed(2);
      var ceilTile = 2 * SPACING;
      var kOffset = k * spanLen % ceilTile;
      var seam = (ceilTile - kOffset) % ceilTile;
      var seamBg = '', seamBgSz = '', seamBgPos = '';
      if (seam > 0 && seam < spanLen) {
        var sp = seam / spanLen * 100;
        var s0 = Math.max(0, sp - 4).toFixed(1), s1 = Math.max(0, sp - 0.8).toFixed(1);
        var s2 = Math.min(100, sp + 0.8).toFixed(1), s3 = Math.min(100, sp + 5).toFixed(1);
        seamBg = 'linear-gradient(to bottom,transparent '+s0+'%,rgba(2,1,7,0.82) '+s1+'%,rgba(2,1,7,0.82) '+s2+'%,transparent '+s3+'%), ';
        seamBgSz = 'auto, '; seamBgPos = 'center, ';
      }
      el.style.background = seamBg + 'linear-gradient(to bottom,rgba(2,1,7,'+ov+'),rgba(2,1,7,'+(Math.min(parseFloat(ov)+0.12,1)).toFixed(2)+')), url(\'https://res.cloudinary.com/ds8pkprtb/image/upload/aetherwood/portal/wooden_ceiling.jpg\')';
      el.style.backgroundSize = seamBgSz + '100% 100%, 100% ' + ceilTile + 'px';
      el.style.backgroundPosition = seamBgPos + 'center, center -' + kOffset.toFixed(1) + 'px';
      for (var i2=0;i2<DOORS;i2++){
        var cz = -i2*SPACING;
        if (cz <= z0 && cz >= z1){
          var d = document.createElement('div');
          d.className = 'shell-spot';
          var w = 110*vmin, h2 = 70*vmin;
          d.style.width = w.toFixed(1)+'px'; d.style.height = h2.toFixed(1)+'px';
          d.style.left = (cw/2 + DOOR_META[i2].side*30*vmin - w/2).toFixed(1)+'px';
          d.style.top  = ((z0 - cz) - h2/2).toFixed(1)+'px';
          d.style.background = sealed[i2] ? COLD : WARM;
          d.style.opacity = 0.45;
          el.appendChild(d);
        }
      }
      var lanternZs = [z0 - spanLen*0.22, z0 - spanLen*0.50, z0 - spanLen*0.78];
      lanternZs.forEach(function(cz, li){
        var l = document.createElement('div');
        l.className = 'ceiling-lantern';
        var lw = 52*vmin, lh = 34*vmin;
        l.style.width = lw.toFixed(1)+'px'; l.style.height = lh.toFixed(1)+'px';
        l.style.left = (cw/2 - lw/2).toFixed(1)+'px';
        l.style.top = ((z0 - cz) - lh/2).toFixed(1)+'px';
        var coldHere = cz < -2.55*SPACING;
        l.style.background = coldHere
          ? 'radial-gradient(ellipse, rgba(164,174,232,0.16) 0%, rgba(120,132,205,0.07) 38%, transparent 72%)'
          : 'radial-gradient(ellipse, rgba(235,184,102,0.24) 0%, rgba(205,148,72,0.10) 38%, transparent 72%)';
        l.style.opacity = (li===1 ? 0.72 : 0.52);
        el.appendChild(l);
      });
      for (var sp=0; sp<18; sp++){
        var star = document.createElement('div');
        star.className = 'ceiling-pin';
        var ss = (0.8 + Math.random()*1.8)*vmin;
        star.style.width = ss.toFixed(2)+'px'; star.style.height = ss.toFixed(2)+'px';
        star.style.left = (cw*(0.18 + Math.random()*0.64)).toFixed(1)+'px';
        star.style.top = (spanLen*Math.random()).toFixed(1)+'px';
        star.style.background = 'rgba(232,205,146,'+(0.16 + Math.random()*0.30).toFixed(2)+')';
        star.style.boxShadow = '0 0 '+(3+Math.random()*8).toFixed(1)+'px rgba(232,190,118,0.28)';
        el.appendChild(star);
      }
      worldShell.appendChild(el);
      shellSegs.push({el:el, zN:z0, zF:z1, hidden:false});
    }
  }



  function buildBeyond(){
    /* Dimensional atmosphere in each door alcove.
       A soft radial glow on the wall face at each door's station — colour-keyed
       to the room beyond. Makes the door feel set into inhabited stone rather
       than floating against a void. Resonance Chamber runs cold violet
       even while sealed; its dark-moon quality bleeds through the seam. */
    var sel = worldShell.querySelectorAll('.door-beyond-el');
    Array.prototype.slice.call(sel).forEach(function(e){ e.remove(); });
    shellSegs = shellSegs.filter(function(s){
      return !(s.el.className && s.el.className.indexOf && s.el.className.indexOf('door-beyond-el') >= 0);
    });

    var wx     = SHELL_WALL_X * vmin;
    var ceilY  = SHELL_CEIL_Y * vmin;
    var floorY = FLOOR_Y_VMIN * vmin;
    var yc     = (floorY + ceilY) * 0.5;
    var H      = floorY - ceilY;
    var W      = 88 * vmin; // panel width along wall face

    /* Inner glow, outer glow per destination — destination-matched palette */
    var GLOWS = [
      {a:'rgba(226,168,78,0.32)', b:'rgba(226,168,78,0.07)'},   // Whispered Archives — deep amber
      {a:'rgba(132,188,108,0.26)', b:'rgba(132,188,108,0.06)'}, // Library of Tales — ember green
      {a:'rgba(228,178,84,0.28)', b:'rgba(228,178,84,0.06)'},   // Compliance Office — warm amber
      {a:'rgba(138,118,214,0.22)', b:'rgba(138,118,214,0.05)'}  // Resonance Chamber — cold violet
    ];

    for (var i = 0; i < DOORS; i++){
      var dz   = -i * SPACING;
      var side = DOOR_META[i].side;
      var gc   = GLOWS[i];

      var el = document.createElement('div');
      el.className = 'shell-seg door-beyond-el';
      el.style.width  = W.toFixed(1) + 'px';
      el.style.height = H.toFixed(1) + 'px';
      el.style.transform = 'translate(-50%,-50%) translate3d('
        + (side * wx).toFixed(1) + 'px,'
        + yc.toFixed(1) + 'px,'
        + dz.toFixed(1) + 'px) rotateY(' + (side < 0 ? 90 : -90) + 'deg)';
      /* Elliptical glow centred slightly below mid — the threshold of the room */
      el.style.background = 'radial-gradient(ellipse 58% 44% at 50% 54%, '
        + gc.a + ', ' + gc.b + ' 52%, transparent 72%)';
      worldShell.appendChild(el);
      shellSegs.push({el:el, zN:dz + SPACING*0.65, zF:dz - SPACING*0.65, hidden:false});
    }
  }

  /* ———— sconces : wrought brackets and wax beneath each candle pool.
     The pool's flickering core already burns where the wick sits, so the
     existing light becomes the candle's flame. Cold pools hold stubs —
     the Chamber's end of the hall has gone out, not gone unlit. ————*/
  function buildSconces(){
    Array.prototype.slice.call(world.querySelectorAll('.sconce')).forEach(function(e){ e.remove(); });
    /* Glow-only sconces: no fixture geometry, just warm ambient light on stone */
    var WARM_SC = 'radial-gradient(ellipse at 50% 78%, rgba(255,190,80,0.72) 0%, rgba(220,140,50,0.38) 22%, rgba(180,100,30,0.15) 48%, transparent 72%)';
    var LOW_SC  = 'radial-gradient(ellipse at 50% 78%, rgba(240,170,60,0.50) 0%, rgba(200,120,40,0.24) 26%, rgba(160,85,25,0.10) 54%, transparent 76%)';
    var COLD_SC = 'radial-gradient(ellipse at 50% 78%, rgba(140,158,218,0.35) 0%, rgba(100,118,190,0.16) 28%, rgba(75,95,160,0.07) 56%, transparent 78%)';
    pools.forEach(function(p){
      var el = document.createElement('div');
      el.className = 'sconce';
      var w = 20*vmin, h = 28*vmin;
      el.style.width = w.toFixed(1)+'px'; el.style.height = h.toFixed(1)+'px';
      el.style.transform = 'translate(-50%,-50%) translate3d('
        + (p.side*POOL_X_VMIN*vmin).toFixed(1)+'px,'
        + ((p.y+5.5)*vmin).toFixed(1)+'px,'
        + (-p.cx*SPACING - 2).toFixed(1)+'px)';
      var low = p.el.className.indexOf('low') >= 0;
      el.style.background = (p.cold ? COLD_SC : (low ? LOW_SC : WARM_SC));
      world.appendChild(el);
      shellSegs.push({el:el, zN:-p.cx*SPACING, zF:-p.cx*SPACING, hidden:false});
    });
  }
  buildShell(); buildSconces(); buildBeyond();

  function cullShell(off){
    for (var k=0;k<shellSegs.length;k++){
      var s = shellSegs[k];
      var keepFar = s.endless || (s.el.className && s.el.className.indexOf('far-wall-seg') >= 0);
      var hide = !keepFar && ((s.zF + off > 1000) || (s.zN + off < -2.55*SPACING));
      if (hide !== s.hidden){ s.hidden = hide; s.el.style.display = hide ? 'none' : ''; }
    }
  }

  /* ———— motes (screen space) ———— */
  (function makeParticles(){
    var layer = document.getElementById('particles');
    for (var i=0;i<26;i++){
      var p = document.createElement('div');
      p.className = 'particle';
      var s = 1 + Math.random()*2.4;
      p.style.width = s+'px'; p.style.height = s+'px';
      p.style.left = (Math.random()*100)+'%';
      p.style.top  = (20+Math.random()*70)+'%';
      p.style.background = 'rgba('+(205+Math.random()*40|0)+','+(165+Math.random()*40|0)+','+(95+Math.random()*40|0)+',1)';
      p.style.setProperty('--pd',(7+Math.random()*9)+'s');
      p.style.setProperty('--po',(-Math.random()*10)+'s');
      p.style.setProperty('--pa',(0.18+Math.random()*0.4).toFixed(2));
      p.style.setProperty('--px',((Math.random()*60-30))+'px');
      p.style.setProperty('--py',(-(20+Math.random()*60))+'px');
      layer.appendChild(p);
    }
  })();

  /* ———————————————————————— RENDER ———————————————————————— */
  function render(){
    // the camera walks: the world slides toward you — and the stone shell with it
    var wt = 'translateZ(' + (pos*SPACING).toFixed(1) + 'px)';
    world.style.transform = wt;
    worldShell.style.transform = wt;
    cullShell(pos*SPACING);

    /* Tree backdrop: orbits the camera at constant distance — a magical fixed presence. */
    if (endlessBackdrop){
      var bz = -(pos + 2.82) * SPACING;
      endlessBackdrop.style.transform = 'translate(-50%,-50%) translate3d(0,'+(((FLOOR_Y_VMIN+SHELL_CEIL_Y)/2)*vmin).toFixed(1)+'px,'+bz.toFixed(1)+'px)';
      endlessBackdrop.style.opacity = '0.85';
      endlessBackdrop.style.filter = 'saturate(0.85) brightness(0.7)';
    }

    for (var i=0;i<DOORS;i++){
      var d = pos - i;              // >0 : door is behind you
      var ad = Math.abs(d);
      var plane = planes[i];
      var side = DOOR_META[i].side;

      if (d > 0.42 || d < -2.8){
        plane.style.opacity = 0; plane.style.display = 'none';
      } else {
        // turn-to-face: only once you have come to rest does the door turn to meet you
        var f = smooth(1 - ad/FACE_RANGE) * calmAmt;
        var x  = side * WALL_X_VMIN * vmin * (1 - f);
        var ry = side * WALL_ANGLE * (1 - f);
        var z  = -i*SPACING + f*FACE_FWD;   // its station in the hall, plus a step toward you when faced
        var bright = clamp(1 - 0.62*ad, 0.16, 1);
        var op = d > 0.14 ? clamp(1 - (d-0.14)/0.26, 0, 1) :   // fades as it passes your shoulder
                 d < -2.4 ? clamp(1 - (-d - 2.4)/0.4, 0, 1) :  // emerges from the dark ahead
                 1;
        plane.style.display = '';
        plane.style.opacity = op.toFixed(3);
        plane.style.transform = 'translate(-50%,-50%) translate3d('+x.toFixed(1)+'px,0,'+z.toFixed(1)+'px) rotateY('+ry.toFixed(2)+'deg)';
        plane.style.filter = 'brightness('+bright.toFixed(3)+')';
      }

      // its light reaches down the hall before the door does
      var halo = halos[i];
      if (ad < 1.1){
        var hOp = Math.pow(clamp(1.05 - ad, 0, 1), 1.5) * (sealed[i] ? 0.7 : 1);
        var hx = side * 30 * vmin * (1 - smooth(1 - ad/FACE_RANGE) * calmAmt);
        halo.style.display = '';
        halo.style.opacity = (hOp*0.95).toFixed(3);
        halo.style.transform = 'translate(-50%,-50%) translate3d('+hx.toFixed(1)+'px,0,'+(-i*SPACING - 40).toFixed(1)+'px)';
      } else { halo.style.opacity = 0; halo.style.display = 'none'; }
    }

    // halos and planes share the world transform; pools just need placing once per frame for culling
    for (var j=0;j<pools.length;j++){
      var pl = pools[j];
      var dp = pos - pl.cx;
      if (dp > 0.3 || dp < -2.6){ pl.el.style.opacity = 0; continue; }
      var fade = dp > 0.1 ? clamp(1 - (dp-0.1)/0.2, 0, 1) : 1;
      pl.el.style.opacity = fade.toFixed(3);
      pl.el.style.transform = 'translate(-50%,-50%) translate3d('
        + (pl.side * POOL_X_VMIN * vmin).toFixed(1) + 'px,'
        + (pl.y * vmin).toFixed(1) + 'px,'
        + (-pl.cx * SPACING).toFixed(1) + 'px)';
    }

    // leave the light, pass through dark, arrive
    var frac = Math.abs(pos - Math.round(pos));
    passageDark.style.opacity = (Math.pow(clamp(frac/0.5,0,1),1.4) * 0.38).toFixed(3);

    // the cold creeps in as you near the sleeping Chamber
    coldTint.style.opacity = (clamp((pos - 2.15)/0.85, 0, 1) * 0.55).toFixed(3);

    // a passed door's light lingers at your shoulder
    var pi = Math.round(pos) - 1 >= 0 ? Math.round(pos)-1 : -1;
    edgeL.style.opacity = 0; edgeR.style.opacity = 0;
    if (pi >= 0){
      var lp = clamp(1 - (pos - pi - 0.3)/0.7, 0, 1) * clamp((pos-pi-0.1)/0.2,0,1);
      var edge = DOOR_META[pi].side < 0 ? edgeL : edgeR;
      edge.classList.toggle('cold', sealed[pi]);
      edge.style.opacity = (lp*0.85).toFixed(3);
    }

    navPrev.classList.toggle('hidden', pos < -0.2);
    navNext.classList.toggle('hidden', pos > LAST + 0.5);
  }

  function setSettled(on){
    if (on === settled) return;
    settled = on;
    var nearest = clamp(Math.round(pos), 0, LAST);
    if (on) updateNavLabels();
    planes.forEach(function(plane, i){
      plane.classList.toggle('focus', on && i === nearest);
      plane.classList.toggle('settled', on && i === nearest);
    });
    document.getElementById('everflame').classList.toggle('ef-active', !!(on && sealed[nearest]));
    if (on){
      nameText.textContent = DOOR_META[nearest].name;
      whisperText.textContent = DOOR_META[nearest].whisper;
      doorText.classList.toggle('enterable', !sealed[nearest]);
      doorText.classList.add('show');
    } else {
      doorText.classList.remove('show');
      planes.forEach(function(plane){ plane.classList.remove('focus','settled'); });
    }
  }

  /* ———————————————————————— PHYSICS (unchanged heart) ———————————————————————— */
  var lastFrame = performance.now();
  function tick(now){
    var dt = Math.min((now - lastFrame) / 16.667, 3);
    lastFrame = now;

    if (!dragging && !locked && awoken){
      if (goal !== null){
        var dgo = goal - pos;
        vel = 0;
        pos += dgo * (1 - Math.pow(1 - GOAL_SPRING, dt));
        if (Math.abs(dgo) < SETTLE_POS){ pos = goal; goal = null; }
      } else {
        pos += vel * dt;
        vel *= Math.pow(FRICTION, dt);
        if (pos < 0){ pos += (0 - pos) * RUBBER * dt; vel *= 0.7; }
        if (pos > LAST){ pos += (LAST - pos) * RUBBER * dt; vel *= 0.7; }
        if (Math.abs(vel) < 0.012){
          var target = clamp(Math.round(pos), 0, LAST);
          pos += (target - pos) * (1 - Math.pow(1 - SPRING, dt));
          if (Math.abs(target - pos) < SETTLE_POS && Math.abs(vel) < SETTLE_VEL){
            pos = target; vel = 0;
          }
        }
      }
    }

    // calm: 1 only when you are truly at rest — doors wait for stillness before turning
    var calmTgt = (!dragging && goal === null && Math.abs(vel) < 0.02) ? 1 : 0;
    calmAmt += (calmTgt - calmAmt) * Math.min(1, FACE_EASE * dt);

    var atRest = awoken && !dragging && goal === null && vel === 0 && Math.abs(pos - Math.round(pos)) < SETTLE_POS;
    setSettled(atRest);
    render();
    requestAnimationFrame(tick);
  }

  /* ———————————————————————— INPUT : one path for everything ———————————————————————— */
  vestibule.addEventListener('pointerdown', function(e){
    if (locked) return;
    if (e.target.closest('.nav-prev') || e.target.closest('.nav-next')) return;
    if (settled && e.target.closest('.door-plane.focus')){ dragMoved = 0; return; }
    dragging = true; goal = null; awoken = true;
    dragMoved = 0; dragVel = 0;
    lastX = e.clientX; lastT = performance.now();
    vestibule.classList.add('dragging');
    vestibule.setPointerCapture(e.pointerId);
    setSettled(false);
  });

  vestibule.addEventListener('pointermove', function(e){
    if (!dragging) return;
    var dx = e.clientX - lastX;
    var t = performance.now();
    var dtMs = Math.max(t - lastT, 1);
    lastX = e.clientX; lastT = t;
    dragMoved += Math.abs(dx);
    var dpos = -(dx / vw) * DRAG_GAIN;   // swipe left = walk deeper, as in v8
    if ((pos <= 0 && dpos < 0) || (pos >= LAST && dpos > 0)) dpos *= 0.3;
    pos += dpos;
    dragVel = dragVel * 0.6 + (dpos / (dtMs/16.667)) * 0.4;
  });

  function endDrag(){
    if (!dragging) return;
    dragging = false;
    vestibule.classList.remove('dragging');
    vel = clamp(dragVel, -MAX_VEL, MAX_VEL);
    dragVel = 0;
  }
  vestibule.addEventListener('pointerup', endDrag);
  vestibule.addEventListener('pointercancel', endDrag);

  vestibule.addEventListener('wheel', function(e){
    if (locked) return;
    e.preventDefault();
    goal = null; awoken = true;
    // scroll down = walk forward into the hall; horizontal still respected
    var delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    vel = clamp(vel + delta * WHEEL_GAIN, -MAX_VEL, MAX_VEL);
    setSettled(false);
  }, {passive:false});

  function walkTo(i){
    if (locked) return;
    awoken = true;
    goal = clamp(i, 0, LAST);
    vel = 0;
    setSettled(false);
  }
  function stepFwd(){
    if (Math.round(pos) >= LAST) { enterHearthfire(); }
    else { walkTo(pos < -0.05 ? 0 : Math.round(pos)+1); }
  }
  // walking forward past the last door enters the Hearthfire
  function enterHearthfire(){
    if (locked) return;
    locked = true;
    fadeCover.classList.remove('out');
    fadeCover.classList.add('in');
    setTimeout(function(){ window.location.href = 'hearthfire.html'; }, 1600);
  }
  // walking back past the first door returns you through the Threshold
  function leaveHall(){
    if (locked) return;
    awoken = true;
    goal = START_POS;             // glide back to the hall mouth
    setSettled(false);
    setTimeout(function(){
      locked = true;
      fadeCover.classList.remove('out');
      fadeCover.classList.add('in');
      setTimeout(function(){ window.location.href = 'index.html'; }, 1600);
    }, 900);
  }
  function stepBack(){
    if (Math.round(pos) <= 0){ leaveHall(); }
    else { walkTo(Math.round(pos)-1); }
  }
  navPrev.addEventListener('click', function(){ stepBack(); });
  navNext.addEventListener('click', function(){ stepFwd(); });

  // what lies behind, what lies ahead — written beside each pip
  var navPrevLabel = document.getElementById('navPrevLabel');
  var navNextLabel = document.getElementById('navNextLabel');
  function updateNavLabels(){
    var here = clamp(Math.round(Math.max(pos, 0)), 0, LAST);
    var ahead = pos < -0.05 ? 0 : here + 1;
    navPrevLabel.textContent = here - 1 >= 0 ? DOOR_META[here-1].name : 'Threshold';
    navNextLabel.textContent = ahead <= LAST ? DOOR_META[ahead].name : 'Hearthfire';
  }

  // long-press a pip to read the name without travelling (touch)
  function navHold(el){
    var t = null, held = false;
    el.addEventListener('pointerdown', function(){
      held = false;
      t = setTimeout(function(){ held = true; el.classList.add('reveal'); }, 450);
    });
    function release(){
      clearTimeout(t);
      if (held) setTimeout(function(){ el.classList.remove('reveal'); }, 1400);
    }
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('click', function(e){
      if (held){ e.stopImmediatePropagation(); e.preventDefault(); held = false; }
    }, true);
  }
  navHold(navPrev); navHold(navNext);

  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown')  stepBack();
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') stepFwd();
  });

  // on mobile: a tap on the focused door should enter it, not start a corridor drag
  planes.forEach(function(plane, i){
    plane.addEventListener('pointerdown', function(e){
      if (locked) return;
      if (settled && !sealed[i] && Math.round(pos) === i){
        dragMoved = 0;
        e.stopPropagation();
      }
    });
  });

  // step through — settled, facing, and the press wasn't a drag
  planes.forEach(function(plane, i){
    plane.addEventListener('click', function(){
      if (locked || !settled || dragMoved > 8) return;
      if (Math.round(pos) !== i) return;
      if (sealed[i]) return;                    // the chamber sleeps
      locked = true;
      fadeCover.classList.remove('out');
      fadeCover.classList.add('in');
      var href = plane.dataset.href;
      setTimeout(function(){
        if (href){ window.location.href = href; }
        else {
          fadeCover.classList.remove('in');
          fadeCover.classList.add('out');
          locked = false;
        }
      }, 1600);
    });
  });

  /* ———————————————————————— UNSCHEDULED EVENTS ———————————————————————— */
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function spawnGutter(){
    var visible = pools.filter(function(p){
      var dp = pos - p.cx;
      return dp < 0.25 && dp > -1.6;
    });
    if (!visible.length) return false;
    var p = visible[Math.floor(Math.random()*visible.length)];
    p.el.classList.add('gutter');
    setTimeout(function(){ p.el.classList.remove('gutter'); }, 3000);
    return true;
  }
  function spawnShadow(){
    var s = document.createElement('div');
    s.className = 'passing-shadow';
    s.style.setProperty('--sd', (14 + Math.random()*7).toFixed(1)+'s');
    vestibule.insertBefore(s, edgeL);
    s.addEventListener('animationend', function(){ s.remove(); });
    return true;
  }
  function spawnMote(){
    var m = document.createElement('div');
    m.className = 'drift-mote';
    var size = 2 + Math.random()*2.5;
    m.style.width = size+'px'; m.style.height = size+'px';
    var fromLeft = Math.random() < 0.5;
    m.style.left = fromLeft ? (4+Math.random()*10)+'%' : (86+Math.random()*10)+'%';
    m.style.top  = (30+Math.random()*45)+'%';
    m.style.setProperty('--mx', (fromLeft ? 1 : -1) * (28+Math.random()*14) + 'vw');
    m.style.setProperty('--my', (-(6+Math.random()*14)) + 'vh');
    m.style.setProperty('--md', (9+Math.random()*5).toFixed(1)+'s');
    vestibule.insertBefore(m, edgeL);
    m.addEventListener('animationend', function(){ m.remove(); });
    return true;
  }
  function spawnWing(){
    if (Math.round(pos) !== 0) return false;   // only above the Whispered Archives
    var w = document.createElement('div');
    w.className = 'wing-shape';
    vestibule.insertBefore(w, edgeL);
    w.addEventListener('animationend', function(){ w.remove(); });
    return true;
  }
  function runEvent(){
    if (reduceMotion) return;
    if (document.hidden || !settled || locked){ scheduleEvent(18000); return; }
    var r = Math.random(), done;
    if (r < 0.12)      done = spawnWing();
    else if (r < 0.42) done = spawnGutter();
    else if (r < 0.72) done = spawnMote();
    else               done = spawnShadow();
    if (!done) spawnMote();
    scheduleEvent();
  }
  function scheduleEvent(overrideMs){
    setTimeout(runEvent, overrideMs || (60000 + Math.random()*180000));
  }
  if (!reduceMotion) scheduleEvent(40000 + Math.random()*50000);

  /* ———————————————————————— ARRIVAL ————————————————————————
     You have just stepped through the Threshold's warm bloom.
     You stand at the start of the hall; its light fades at your
     back as the walk carries you gently to the first door.
     Threshold link (Task 2) will read: localStorage.getItem('aetherwood_name') */
  /* ———————————————————————— ARRIVAL ————————————————————————
     A still arrival. The Threshold's warm bloom fades at your back
     and the hall is simply there — doors angled in their alcoves,
     deeper lights glowing down the dark. Nothing moves until you do.
     Threshold link (Task 2) will read: localStorage.getItem('aetherwood_name') */
  pos = wantsToWalk ? LAST : START_POS;  // from hearthfire: arrive at tree end; otherwise: hall mouth
  localStorage.setItem('aetherwood_visited', '1'); // next visit goes to Hearthfire
  /* log this page to the Everflame trail */
  (function(){
    var trail = JSON.parse(localStorage.getItem('aetherwood_trail') || '[]');
    trail = trail.filter(function(e){ return e.href !== 'vestibule.html'; });
    trail.unshift({ name: 'the corridor', href: 'vestibule.html?walk=1' });
    if (trail.length > 5) trail = trail.slice(0, 5);
    localStorage.setItem('aetherwood_trail', JSON.stringify(trail));
  })();
  updateNavLabels();
  render();
  /* the hall breathes in — arriving as the Threshold departs, darkness lifting */
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    fadeCover.style.transition = 'opacity 1.9s ease';
    fadeCover.style.opacity = '0';
    setTimeout(function(){ fadeCover.style.transition=''; fadeCover.style.opacity=''; }, 2000);
  }); });
  requestAnimationFrame(tick);

  /* ————— EVERFLAME : dormancy escalation ————— */
  (function(){
    var ef = document.getElementById('everflame');
    var timer = null;
    var DORMANCY = 10000;
    function reset(){
      ef.classList.remove('urge');
      clearTimeout(timer);
      timer = setTimeout(function(){ ef.classList.add('urge'); }, DORMANCY);
    }
    ['mousemove','mousedown','touchstart','scroll','keydown','pointerdown'].forEach(function(ev){
      window.addEventListener(ev, reset, {passive:true});
    });
    reset();
  })();

})();
</script>

<div id="everflame" aria-label="Everflame"></div>
</body>
</html>
