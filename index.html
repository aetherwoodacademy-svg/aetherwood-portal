<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a12" />
  <title>Aetherwood</title>

  <!--
    AETHERWOOD — THRESHOLD (v2)

    Doors are slightly ajar in the canon image. The visitor's gesture is
    stepping through the warm light, not opening the doors.

    Painted window is left untouched. The four elements are carved into
    a stone band above the doors. Phase is signalled through the window's
    own glow shifting and through the line below the doors. Season is
    expressed through particles drifting at the lower edge.

    Three signature touches: candle seam (steady warmth), window glow
    (slow phase-tied pulse), particles (slow drift). Per Architecture v2.1.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #07070c;
      --ink-cream: #e8dcc4;
      --ink-muted: rgba(232, 220, 196, 0.66);
      --ink-faint: rgba(232, 220, 196, 0.36);
      --amber-warm: #f3b05c;
      --amber-glow: rgba(243, 176, 92, 0.35);
      --stone-etch: rgba(180, 175, 160, 0.55);

      --serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;
      --tracking-wordmark: 0.42em;
      --tracking-phase: 0.28em;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: var(--bg-deep);
      color: var(--ink-cream);
      font-family: var(--serif);
      font-weight: 400;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }
    body { position: relative; min-height: 100vh; min-height: 100dvh; }

    .threshold-image {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background-image: url("images/threshold_background.png");
      background-size: cover;
      background-position: center 38%;
      background-repeat: no-repeat;
      z-index: 0;
      transform: scale(1.02);
      transition: transform 1800ms cubic-bezier(0.22, 1, 0.36, 1),
                  filter 1600ms ease-out;
      will-change: transform, filter;
    }

    .gradient-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 18vh;
      background: linear-gradient(to bottom, rgba(7, 7, 12, 0.6), rgba(7, 7, 12, 0));
      z-index: 1;
      pointer-events: none;
    }
    .gradient-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 50vh;
      background: linear-gradient(to top,
        rgba(7, 7, 12, 0.94) 0%,
        rgba(7, 7, 12, 0.78) 30%,
        rgba(7, 7, 12, 0.42) 65%,
        rgba(7, 7, 12, 0) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Phase-responsive window glow — soft radial wash positioned over the painted window */
    .window-glow {
      position: fixed;
      left: 50%;
      top: 22%;
      transform: translate(-50%, -50%);
      width: min(78vw, 360px);
      aspect-ratio: 1 / 1;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(
        circle at center,
        rgba(140, 180, 230, var(--phase-glow, 0.25)) 0%,
        rgba(100, 140, 200, calc(var(--phase-glow, 0.25) * 0.5)) 35%,
        rgba(0, 0, 0, 0) 65%
      );
      mix-blend-mode: screen;
      filter: blur(6px);
      animation: glowBreath 12s ease-in-out infinite;
      opacity: 0;
      transition: opacity 2000ms ease-out;
    }
    .window-glow.lit { opacity: 1; }

    @keyframes glowBreath {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -50%) scale(1.04); }
    }

    /* Element band — four painted glyphs. Current season's glyph holds
       full luminosity with an amber wash; the others dim like memory. */
    .element-band {
      position: fixed;
      left: 50%;
      top: 41%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      display: flex;
      gap: clamp(22px, 6.5vw, 38px);
      align-items: center;
      opacity: 0;
      animation: fadeInUp 2200ms ease-out 1100ms forwards;
    }
    .element-band .glyph {
      width: clamp(34px, 7.2vw, 52px);
      height: auto;
      display: block;
      opacity: 0.34;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.65)) saturate(0.55) brightness(0.82);
      transition: opacity 1800ms ease-out, filter 1800ms ease-out;
    }
    html[data-season="spring"] .element-band .glyph[data-season="spring"],
    html[data-season="summer"] .element-band .glyph[data-season="summer"],
    html[data-season="autumn"] .element-band .glyph[data-season="autumn"],
    html[data-season="winter"] .element-band .glyph[data-season="winter"] {
      opacity: 1;
      filter:
        drop-shadow(0 0 12px rgba(243, 176, 92, 0.42))
        drop-shadow(0 2px 4px rgba(0,0,0,0.55))
        saturate(1.08) brightness(1.04);
    }

    /* Seasonal particles */
    .particles {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60vh;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      animation: drift linear infinite;
      will-change: transform;
    }
    .particle.leaf {
      width: 8px; height: 8px;
      background: radial-gradient(ellipse at 30% 30%, #c87844 0%, #8b4520 70%, transparent 100%);
      border-radius: 50% 0 50% 0;
      opacity: 0.6;
      filter: blur(0.3px);
    }
    .particle.petal {
      width: 6px; height: 7px;
      background: radial-gradient(ellipse at 40% 30%, rgba(245, 220, 220, 0.9), rgba(220, 200, 210, 0.5));
      border-radius: 50% 50% 50% 0;
      opacity: 0.55;
    }
    .particle.mote {
      width: 3px; height: 3px;
      background: var(--amber-warm);
      border-radius: 50%;
      box-shadow: 0 0 6px 1px var(--amber-glow);
      opacity: 0.65;
    }
    .particle.snow {
      width: 4px; height: 4px;
      background: rgba(232, 230, 224, 0.85);
      border-radius: 50%;
      box-shadow: 0 0 4px 1px rgba(232, 230, 224, 0.3);
      opacity: 0.7;
    }
    @keyframes drift {
      0%   { transform: translate(0, 60vh) rotate(0deg); }
      100% { transform: translate(var(--dx, 30px), -10vh) rotate(var(--rot, 180deg)); }
    }
    @keyframes snowfall {
      0%   { transform: translate(0, -10vh) rotate(0deg); }
      100% { transform: translate(var(--dx, 20px), 60vh) rotate(var(--rot, 90deg)); }
    }
    .particle.snow { animation-name: snowfall; }

    /* Candlelight seam — steady warmth (doors ajar) with subtle flicker */
    .door-seam {
      position: fixed;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      width: 14vw;
      height: 22vh;
      max-width: 70px;
      max-height: 140px;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(ellipse at center,
        rgba(243, 176, 92, 0.55) 0%,
        rgba(243, 176, 92, 0.22) 35%,
        rgba(243, 176, 92, 0) 70%);
      filter: blur(8px);
      animation: flicker 7s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.75; transform: translate(-50%, -50%) scale(1); }
      40%      { opacity: 0.85; transform: translate(-50%, -50%) scale(1.04); }
      55%      { opacity: 0.7;  transform: translate(-50%, -50%) scale(1.02); }
      75%      { opacity: 0.9;  transform: translate(-50%, -50%) scale(1.06); }
    }

    .stage {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header.wordmark {
      padding: 28px 24px 0;
      text-align: center;
      opacity: 0;
      animation: fadeInDown 1800ms ease-out 400ms forwards;
    }
    .wordmark-text {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(13px, 3.4vw, 16px);
      letter-spacing: var(--tracking-wordmark);
      text-transform: uppercase;
      color: var(--ink-cream);
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.85);
      padding-left: var(--tracking-wordmark);
    }

    .threshold-foot {
      padding: 0 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: auto;
    }

    .phase-name {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(12px, 3vw, 14px);
      letter-spacing: var(--tracking-phase);
      text-transform: uppercase;
      color: var(--ink-cream);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.9);
      padding-left: var(--tracking-phase);
      margin: 0 0 18px;
      opacity: 0;
      animation: fadeInUp 1600ms ease-out 1000ms forwards;
    }

    .phase-line {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(17px, 4.6vw, 22px);
      line-height: 1.55;
      color: var(--ink-cream);
      text-align: center;
      max-width: 32ch;
      margin: 0 0 36px;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.9);
      opacity: 0;
      animation: fadeInUp 1800ms ease-out 1300ms forwards;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
      opacity: 0;
      animation: fadeInUp 1800ms ease-out 1700ms forwards;
    }

    .door-button {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(15px, 4vw, 17px);
      letter-spacing: 0.04em;
      color: var(--ink-cream);
      background: rgba(7, 7, 12, 0.42);
      border: 1px solid rgba(232, 220, 196, 0.4);
      border-radius: 2px;
      padding: 16px 28px;
      width: 100%;
      cursor: pointer;
      transition: border-color 280ms ease, background 280ms ease, color 280ms ease, transform 280ms ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
    }
    .door-button:hover { border-color: var(--amber-warm); color: var(--amber-warm); background: rgba(20, 14, 8, 0.55); }
    .door-button:focus-visible { outline: none; border-color: var(--amber-warm); box-shadow: 0 0 0 2px var(--amber-glow); }
    .door-button:active { transform: translateY(1px); }

    .door-hotspot {
      position: fixed;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      width: 50vw;
      height: 38vh;
      max-width: 280px;
      max-height: 360px;
      z-index: 2;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
    }
    .door-hotspot:focus-visible { outline: 1px dashed var(--amber-glow); outline-offset: 4px; }

    .name-input-wrap { display: none; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
    .name-input-wrap.active { display: flex; animation: fadeInUp 600ms ease-out forwards; }
    .actions.naming { display: none; }

    .name-input {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(17px, 4.6vw, 20px);
      color: var(--ink-cream);
      background: rgba(7, 7, 12, 0.5);
      border: none;
      border-bottom: 1px solid rgba(232, 220, 196, 0.42);
      border-radius: 0;
      padding: 14px 8px;
      width: 100%;
      text-align: center;
      caret-color: var(--amber-warm);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      transition: border-color 280ms ease;
    }
    .name-input:focus { outline: none; border-bottom-color: var(--amber-warm); }
    .name-input::placeholder { color: var(--ink-faint); font-style: italic; }

    .name-actions { display: flex; gap: 12px; }
    .name-actions .door-button { padding: 14px 20px; font-size: clamp(14px, 3.8vw, 16px); }
    .name-actions .ghost { background: transparent; border-color: rgba(232, 220, 196, 0.22); color: var(--ink-muted); }

    .crossing-bloom {
      position: fixed;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 1px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 160, 0.95) 0%, rgba(243, 176, 92, 0.6) 30%, rgba(243, 176, 92, 0) 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      filter: blur(2px);
    }
    body.crossing .crossing-bloom { animation: bloom 1600ms cubic-bezier(0.5, 0, 0.5, 1) forwards; }
    body.crossing .threshold-image { transform: scale(1.06); filter: brightness(1.15); }
    body.crossing .stage > *,
    body.crossing .element-band,
    body.crossing .window-glow,
    body.crossing .particles { opacity: 0; transition: opacity 600ms ease-out; }
    body.crossing .door-seam { opacity: 0; transition: opacity 400ms ease-out; }

    @keyframes bloom {
      0%   { width: 1px; height: 1px; opacity: 0; }
      30%  { width: 80vw; height: 80vh; opacity: 1; }
      70%  { width: 220vw; height: 220vh; opacity: 1; }
      100% { width: 320vw; height: 320vh; opacity: 1; background: radial-gradient(circle, rgba(7,7,12,1) 60%, rgba(243, 176, 92, 0.4) 100%); }
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (min-width: 720px) {
      .threshold-image { background-position: center 36%; }
      .window-glow { top: 18%; width: min(42vw, 380px); }
      .element-band { top: 38%; gap: 32px; }
      .door-seam { max-width: 80px; max-height: 160px; top: 58%; }
      .door-hotspot { top: 58%; }
      .threshold-foot { padding-bottom: 56px; }
      .phase-line { max-width: 38ch; }
    }

    @media (min-width: 1024px) {
      .threshold-image { background-position: center 34%; }
      .window-glow { top: 16%; width: min(28vw, 400px); }
      .element-band { top: 36%; gap: 36px; }
      .door-seam { max-width: 90px; max-height: 180px; top: 56%; }
      .door-hotspot { top: 56%; }
      header.wordmark { padding-top: 40px; }
      .threshold-foot { padding-bottom: 72px; }
    }

    @media (min-aspect-ratio: 16/10) {
      .threshold-image { background-position: center 28%; }
      .window-glow { top: 22%; }
      .element-band { top: 42%; }
      .door-seam { top: 62%; }
      .door-hotspot { top: 62%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .door-seam, .window-glow, .particle { animation: none !important; }
      .particle { display: none; }
      .threshold-image, .stage > *, .phase-name, .phase-line, .actions, header.wordmark, .window-glow, .element-band {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
      }
      .window-glow, .element-band { transform: translate(-50%, -50%) !important; }
      .door-seam { transform: translate(-50%, -50%) !important; opacity: 0.7 !important; }
      header.wordmark, .threshold-foot, .stage > * { transform: none !important; }
      body.crossing .crossing-bloom { animation: bloomReduced 800ms ease-out forwards; }
      @keyframes bloomReduced {
        from { opacity: 0; }
        to   { opacity: 1; width: 320vw; height: 320vh; background: rgba(7,7,12,1); }
      }
    }
  </style>
</head>
<body>
  <div class="threshold-image" aria-hidden="true"></div>
  <div class="gradient-top" aria-hidden="true"></div>
  <div class="gradient-bottom" aria-hidden="true"></div>

  <div class="window-glow" id="window-glow" aria-hidden="true"></div>

  <div class="element-band" aria-label="The four elements held by the threshold">
    <img class="glyph" data-season="spring" src="images/glyph_spring_air.jpg" alt="The Whispering Current — Air, Spring" />
    <img class="glyph" data-season="summer" src="images/glyph_summer_fire.jpg" alt="The Everflame Mark — Fire, Summer" />
    <img class="glyph" data-season="autumn" src="images/glyph_autumn_earth.jpg" alt="The Rooted Remnant — Earth, Autumn" />
    <img class="glyph" data-season="winter" src="images/glyph_winter_water.jpg" alt="The Veilborn Depths — Water, Winter" />
  </div>

  <div class="particles" id="particles" aria-hidden="true"></div>

  <div class="door-seam" aria-hidden="true"></div>

  <button class="door-hotspot" id="door-hotspot" aria-label="Step through the doors"></button>

  <div class="crossing-bloom" aria-hidden="true"></div>

  <div class="stage">
    <header class="wordmark">
      <div class="wordmark-text">Aetherwood</div>
    </header>

    <main class="threshold-foot">
      <div class="phase-name" id="phase-name">&nbsp;</div>
      <p class="phase-line" id="phase-line">&nbsp;</p>

      <div class="actions" id="actions">
        <button type="button" class="door-button" id="btn-cross">cross the threshold</button>
        <button type="button" class="door-button" id="btn-name">give your name to the doors</button>
        <button type="button" class="door-button ghost" id="btn-pass" style="display:none;">pass straight through</button>
      </div>

      <div class="name-input-wrap" id="name-input-wrap">
        <input
          type="text"
          class="name-input"
          id="name-input"
          placeholder="your name"
          autocomplete="off"
          autocapitalize="words"
          spellcheck="false"
          maxlength="40"
          aria-label="your name" />
        <div class="name-actions">
          <button type="button" class="door-button ghost" id="btn-back">step back</button>
          <button type="button" class="door-button" id="btn-name-cross">cross</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const VESTIBULE_URL = "vestibule.html";

    const KEYS = {
      crossed: "aetherwood.crossed",
      name: "aetherwood.name",
      firstCrossing: "aetherwood.firstCrossing"
    };

    (function checkReturning() {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.has("recross")) {
          localStorage.removeItem(KEYS.crossed);
          history.replaceState(null, "", window.location.pathname);
          return;
        }
        const status = localStorage.getItem(KEYS.crossed);
        if (status === "named" || status === "wanderer") {
          document.body.classList.add("returning");
        }
      } catch (e) {}
    })();

    const REF_NEW_MOON = Date.UTC(2000, 0, 6, 18, 14, 0);
    const SYNODIC_DAYS = 29.53058867;

    const PHASE_WINDOWS = [
      { key: "dark",            from: 0.000, to: 0.020 },
      { key: "new",             from: 0.020, to: 0.060 },
      { key: "waxing-crescent", from: 0.060, to: 0.225 },
      { key: "first-quarter",   from: 0.225, to: 0.275 },
      { key: "waxing-gibbous",  from: 0.275, to: 0.475 },
      { key: "full",            from: 0.475, to: 0.525 },
      { key: "waning-gibbous",  from: 0.525, to: 0.725 },
      { key: "last-quarter",    from: 0.725, to: 0.775 },
      { key: "waning-crescent", from: 0.775, to: 0.980 },
      { key: "dark",            from: 0.980, to: 1.000 }
    ];

    const PHASE_LINES = {
      "dark":            { name: "Dark Moon",        line: "No light shines. There can be no light without darkness. Balance within yourself." },
      "new":             { name: "New Moon",         line: "The light is reborn. The Loom has been waiting to hear your dreams. Craft them carefully as you step through the veil." },
      "waxing-crescent": { name: "Waxing Crescent",  line: "Something within is arising. Take steps to make your dreams become reality. Sing with the Threadsingers of the path you hope to weave." },
      "first-quarter":   { name: "First Quarter",    line: "Beneath the light of the half moon. Your resolve may be tested. Share your commitment with the Resonance." },
      "waxing-gibbous":  { name: "Waxing Gibbous",   line: "Blossoming light. There is still time. Believe in your strength. Your thread is weaving its path." },
      "full":            { name: "Full Moon",        line: "A deep surrender. Your work is done. You are at one with the Resonance." },
      "waning-gibbous":  { name: "Waning Gibbous",   line: "Reflect in the light. Breathe. Let the threads be illuminated for a while longer." },
      "last-quarter":    { name: "Last Quarter",     line: "As the light dims. Release the negative thoughts and energy. Let the Loom hold you close one last time in this cycle." },
      "waning-crescent": { name: "Waning Crescent",  line: "Darkness approaches. Do not fear what the dark holds. The threads of the Resonance won't allow you to lose your way." }
    };

    // Window glow intensity per phase. Tunable.
    const PHASE_GLOW = {
      "dark":            0.05,
      "new":             0.12,
      "waxing-crescent": 0.22,
      "first-quarter":   0.32,
      "waxing-gibbous":  0.42,
      "full":            0.55,
      "waning-gibbous":  0.40,
      "last-quarter":    0.30,
      "waning-crescent": 0.20
    };

    function getPhaseFraction(date = new Date()) {
      const days = (date.getTime() - REF_NEW_MOON) / 86400000;
      const pos = ((days % SYNODIC_DAYS) + SYNODIC_DAYS) % SYNODIC_DAYS;
      return pos / SYNODIC_DAYS;
    }
    function getPhaseKey(date = new Date()) {
      const f = getPhaseFraction(date);
      for (const w of PHASE_WINDOWS) if (f >= w.from && f < w.to) return w.key;
      return "dark";
    }

    function detectHemisphere() {
      try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
        const southern = [
          "Australia/", "Pacific/Auckland", "Pacific/Chatham", "Pacific/Fiji",
          "Pacific/Tahiti", "Pacific/Tongatapu", "Pacific/Apia",
          "America/Argentina", "America/Santiago", "America/Sao_Paulo",
          "America/La_Paz", "America/Lima", "America/Asuncion",
          "America/Montevideo", "America/Punta_Arenas",
          "Africa/Johannesburg", "Africa/Maputo", "Africa/Harare",
          "Africa/Lusaka", "Africa/Windhoek", "Africa/Gaborone",
          "Antarctica/", "Indian/Reunion", "Indian/Mauritius"
        ];
        return southern.some(s => tz.startsWith(s) || tz.includes(s)) ? "S" : "N";
      } catch (e) { return "N"; }
    }
    function detectSeason(hemisphere) {
      const m = new Date().getMonth();
      let s;
      if (m >= 2 && m <= 4) s = "spring";
      else if (m >= 5 && m <= 7) s = "summer";
      else if (m >= 8 && m <= 10) s = "autumn";
      else s = "winter";
      if (hemisphere === "S") s = { spring: "autumn", summer: "winter", autumn: "spring", winter: "summer" }[s];
      return s;
    }

    function render() {
      const hem = detectHemisphere();
      const phaseKey = getPhaseKey();
      const phase = PHASE_LINES[phaseKey];
      const season = detectSeason(hem);

      document.getElementById("phase-name").textContent = phase.name;
      document.getElementById("phase-line").textContent = phase.line;
      document.documentElement.dataset.phase = phaseKey;
      document.documentElement.dataset.hemisphere = hem;
      document.documentElement.dataset.season = season;

      const glowEl = document.getElementById("window-glow");
      glowEl.style.setProperty("--phase-glow", String(PHASE_GLOW[phaseKey] ?? 0.25));
      setTimeout(() => glowEl.classList.add("lit"), 800);

      seedParticles(season);
    }

    function seedParticles(season) {
      const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduced) return;

      const container = document.getElementById("particles");
      container.innerHTML = "";

      const profiles = {
        autumn: { cls: "leaf",  count: 14, durMin: 14, durMax: 28, dxRange: 80 },
        spring: { cls: "petal", count: 16, durMin: 12, durMax: 24, dxRange: 70 },
        summer: { cls: "mote",  count: 22, durMin: 10, durMax: 22, dxRange: 40 },
        winter: { cls: "snow",  count: 18, durMin: 16, durMax: 32, dxRange: 50 }
      };
      const p = profiles[season] || profiles.autumn;

      for (let i = 0; i < p.count; i++) {
        const el = document.createElement("div");
        el.className = `particle ${p.cls}`;
        el.style.left = `${Math.random() * 100}%`;
        const duration = p.durMin + Math.random() * (p.durMax - p.durMin);
        const delay = -Math.random() * duration;
        el.style.animationDuration = `${duration}s`;
        el.style.animationDelay = `${delay}s`;
        el.style.setProperty("--dx", `${(Math.random() - 0.5) * p.dxRange * 2}px`);
        el.style.setProperty("--rot", `${(Math.random() - 0.5) * 360}deg`);
        el.style.opacity = String(0.4 + Math.random() * 0.4);
        container.appendChild(el);
      }
    }

    render();

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
      setTimeout(() => { render(); scheduleMidnightRefresh(); }, next - now);
    }
    scheduleMidnightRefresh();

    function storeVisitor(status, name = null) {
      try {
        localStorage.setItem(KEYS.crossed, status);
        if (name) localStorage.setItem(KEYS.name, name);
        if (!localStorage.getItem(KEYS.firstCrossing)) {
          localStorage.setItem(KEYS.firstCrossing, new Date().toISOString());
        }
      } catch (e) {}
    }

    let crossingInFlight = false;
    function cross(status, name = null) {
      if (crossingInFlight) return;
      crossingInFlight = true;
      storeVisitor(status, name);
      document.body.classList.add("crossing");
      const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const delay = reduced ? 600 : 1500;
      setTimeout(() => { window.location.href = VESTIBULE_URL; }, delay);
    }

    const actions = document.getElementById("actions");
    const nameWrap = document.getElementById("name-input-wrap");
    const nameInput = document.getElementById("name-input");
    const btnCross = document.getElementById("btn-cross");
    const btnName = document.getElementById("btn-name");
    const btnBack = document.getElementById("btn-back");
    const btnNameCross = document.getElementById("btn-name-cross");
    const doorHotspot = document.getElementById("door-hotspot");

    function showNameForm() {
      actions.classList.add("naming");
      nameWrap.classList.add("active");
      setTimeout(() => nameInput.focus(), 50);
    }
    function hideNameForm() {
      actions.classList.remove("naming");
      nameWrap.classList.remove("active");
      nameInput.value = "";
    }
    function submitName() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      cross("named", name);
    }

    const btnPass = document.getElementById("btn-pass");
    if (document.body.classList.contains("returning")) {
      btnPass.style.display = "";
    }
    btnPass.addEventListener("click", () => {
      if (crossingInFlight) return;
      crossingInFlight = true;
      document.body.classList.add("crossing");
      const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      setTimeout(() => { window.location.href = VESTIBULE_URL; }, reduced ? 300 : 600);
    });

    btnCross.addEventListener("click", () => cross("wanderer"));
    btnName.addEventListener("click", showNameForm);
    btnBack.addEventListener("click", hideNameForm);
    btnNameCross.addEventListener("click", submitName);
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); submitName(); }
      else if (e.key === "Escape") { hideNameForm(); }
    });

    doorHotspot.addEventListener("click", () => {
      if (nameWrap.classList.contains("active")) return;
      cross("wanderer");
    });

    let scrollArmed = true;
    function onScrollLikeGesture() {
      if (!scrollArmed) return;
      if (nameWrap.classList.contains("active")) return;
      scrollArmed = false;
      cross("wanderer");
    }
    window.addEventListener("wheel", (e) => {
      if (e.deltaY > 0) onScrollLikeGesture();
    }, { passive: true });

    let touchStartY = null;
    window.addEventListener("touchstart", (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener("touchmove", (e) => {
      if (touchStartY === null) return;
      const delta = touchStartY - e.touches[0].clientY;
      if (delta > 30) onScrollLikeGesture();
    }, { passive: true });
  </script>
</body>
</html>
